# Secondo pass prezzi: pomeriggio, budget quasi tutto per fetch (mapping di solito finito al mattino).
name: OP Central — prezzi pomeriggio

on:
  schedule:
    - cron: "30 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: optcg-prices-afternoon
  cancel-in-progress: false

jobs:
  prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Configura API key Cardmarket
        run: |
          cp optcg_config.example.json optcg_config.json
          node -e "
          const fs=require('fs');
          const cfg=JSON.parse(fs.readFileSync('optcg_config.json','utf8'));
          cfg.cardmarketapi.api_key=process.env.CARDMARKET_API_KEY;
          fs.writeFileSync('optcg_config.json',JSON.stringify(cfg,null,2));
          "
        env:
          CARDMARKET_API_KEY: ${{ secrets.CARDMARKET_API_KEY }}

      - name: Prezzi + catalogo (solo refresh)
        env:
          PRICES_CONCURRENCY: "4"
          PRICES_MAX_WALL_MS: "3600000"
          PRICES_MAX_ERRORS: "80"
        run: |
          node optcg_prices.mjs
          node optcg_history.mjs
          node optcg_history_db.mjs
          node optcg_catalog.mjs
          node optcg_urls.mjs
          node optcg_verify.mjs

      - name: Pubblica su GitHub (Render auto-deploy)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add catalog.js optcg_prices.json optcg_history/ || true
          if git diff --staged --quiet; then
            echo "Nessuna modifica da pubblicare."
            exit 0
          fi
          git commit -m "Auto: refresh prezzi $(date -u +%Y-%m-%d) pomeriggio"
          git pull --rebase origin master
          git push

      - name: Trigger deploy Render (hook API)
        if: env.RENDER_API_KEY != '' && env.RENDER_SERVICE_ID != ''
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          curl -sf -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}' || echo "Render deploy hook skipped"
