name: Deploy OP Central (GitHub Pages)

on:
  push:
    branches: [master]
    paths:
      - "catalog.js"
      - "chase-tracker (2).html"
      - "logo.png"
      - "manifest.json"
      - "sw.js"
      - "opc-config.js"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepara sito statico
        run: |
          mkdir -p _site
          cp "chase-tracker (2).html" _site/index.html
          cp catalog.js logo.png manifest.json sw.js opc-config.js _site/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
