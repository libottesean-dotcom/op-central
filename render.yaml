# OP Central su Render — stesso account di lp-generator (Blueprint)
# Dashboard Render → New → Blueprint → repo libottesean-dotcom/op-central
# Env da impostare a mano: DATABASE_URL (Supabase op-command-deck)

services:
  # App web statica (HTML + catalog.js) — ~0€ extra se già pagate istanze/static
  - type: web
    name: op-central-app
    runtime: static
    buildCommand: npm install && node optcg_site_build.mjs
    staticPublishPath: public
    routes:
      - type: rewrite
        source: /
        destination: /index.html
      - type: rewrite
        source: /*
        destination: /index.html

  # Sync collezione/watchlist (Node, sempre acceso)
  - type: web
    name: op-central-sync
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node optcg_sync_server.mjs
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
