# Refresh completo rarità Limitless (set nuovi / correzioni). Giornaliero usa cache (RARITY_MAX_NEW=0).
name: OP Central — rarity refresh settimanale

on:
  schedule:
    - cron: "0 4 * * 0"
      timezone: Europe/Rome
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rarity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - name: Scarica rarità Limitless EN/JP
        run: node optcg_rarity.mjs
        env:
          RARITY_MAX_NEW: 9999
      - name: Pubblica cache rarità
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add optcg_rarity.json
          if git diff --staged --quiet; then exit 0; fi
          git commit -m "Auto: refresh rarità Limitless $(date -u +%Y-%m-%d)"
          git pull --rebase origin master
          git push
