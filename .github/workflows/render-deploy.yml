# Deploy manuale su Render (richiede secrets RENDER_API_KEY + RENDER_SERVICE_ID).
# Dashboard Render → Account Settings → API Keys
# Service ID → URL servizio op-central-app → Settings
name: Deploy Render (op-central-app)

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - catalog.js
      - "chase-tracker (2).html"
      - optcg_catalog.mjs
      - optcg_rarity.json
      - optcg_rarity.mjs
      - optcg_rarity_lib.mjs
      - render.yaml

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verifica catalogo
        run: |
          cp optcg_config.example.json optcg_config.json
          node optcg_rarity_verify.mjs
          node optcg_verify.mjs

      - name: Trigger deploy Render
        if: env.RENDER_API_KEY != '' && env.RENDER_SERVICE_ID != ''
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          curl -sf -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"clear"}'

      - name: Render secrets assenti
        if: env.RENDER_API_KEY == '' || env.RENDER_SERVICE_ID == ''
        run: |
          echo "Aggiungi RENDER_API_KEY e RENDER_SERVICE_ID in GitHub Secrets per deploy automatico."
          echo "Oppure: Render Dashboard → op-central-app → Manual Deploy"
